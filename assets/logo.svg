<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="claude-max-api-proxy logo">
  <title>claude-max-api-proxy</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13111b"/>
      <stop offset="100%" stop-color="#1e1324"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb066"/>
      <stop offset="45%" stop-color="#ff7a3c"/>
      <stop offset="100%" stop-color="#d9421d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ff7a3c" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ff7a3c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff7a3c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Dark rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="6" y="6" width="500" height="500" rx="100" fill="none" stroke="#ff7a3c" stroke-opacity="0.22" stroke-width="2"/>

  <!-- Radial warm glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Left API bracket { -->
  <path d="M152 168
           C132 168 120 180 120 200
           L120 236
           C120 248 112 256 100 256
           C112 256 120 264 120 276
           L120 312
           C120 332 132 344 152 344"
        fill="none"
        stroke="#f5efe7"
        stroke-opacity="0.92"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Right API bracket } -->
  <path d="M360 168
           C380 168 392 180 392 200
           L392 236
           C392 248 400 256 412 256
           C400 256 392 264 392 276
           L392 312
           C392 332 380 344 360 344"
        fill="none"
        stroke="#f5efe7"
        stroke-opacity="0.92"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 8-point concave spark (Anthropic-style) -->
  <g transform="translate(256 256)">
    <path d="M0,-108
             L18,-18
             L108,0
             L18,18
             L0,108
             L-18,18
             L-108,0
             L-18,-18 Z"
          fill="url(#spark)"/>
    <!-- subtle highlight streak -->
    <path d="M0,-108 L18,-18 L0,0 L-18,-18 Z" fill="#ffffff" fill-opacity="0.18"/>
  </g>
</svg>
