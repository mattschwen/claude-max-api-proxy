<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claw Proxy logo">
  <title>Claw Proxy</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="48%" stop-color="#0b0f1f"/>
      <stop offset="100%" stop-color="#14061f"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28ebff"/>
      <stop offset="100%" stop-color="#ff3fd1"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2cecff"/>
      <stop offset="50%" stop-color="#9b7bff"/>
      <stop offset="100%" stop-color="#ff3fd1"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="32%" cy="46%" r="48%">
      <stop offset="0%" stop-color="#ff3fd1" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#ff3fd1" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ff3fd1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="72%" cy="30%" r="46%">
      <stop offset="0%" stop-color="#28ebff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#28ebff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#28ebff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#28ebff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="102" fill="none" stroke="url(#frame)" stroke-width="2.5"/>
  <rect x="20" y="20" width="472" height="472" rx="92" fill="url(#grid)" opacity="0.35"/>
  <circle cx="190" cy="250" r="180" fill="url(#pinkGlow)"/>
  <circle cx="322" cy="206" r="180" fill="url(#cyanGlow)"/>

  <path d="M164 160
           C140 160 126 174 126 198
           L126 226
           C126 240 116 250 102 250
           C116 250 126 260 126 274
           L126 302
           C126 326 140 340 164 340"
        fill="none" stroke="#28ebff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M348 160
           C372 160 386 174 386 198
           L386 226
           C386 240 396 250 410 250
           C396 250 386 260 386 274
           L386 302
           C386 326 372 340 348 340"
        fill="none" stroke="#ff3fd1" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <g transform="translate(256 250)" filter="url(#glow)">
    <path d="M0,-116 L22,-22 L116,0 L22,22 L0,116 L-22,22 L-116,0 L-22,-22 Z" fill="url(#core)"/>
    <path d="M0,-116 L22,-22 L0,0 L-22,-22 Z" fill="#ffffff" fill-opacity="0.18"/>
  </g>

  <path d="M184 108 L328 108" stroke="#28ebff" stroke-opacity="0.42" stroke-width="3"/>
  <path d="M184 392 L328 392" stroke="#ff3fd1" stroke-opacity="0.42" stroke-width="3"/>
</svg>
